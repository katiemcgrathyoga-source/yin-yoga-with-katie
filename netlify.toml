# Netlify build configuration for the Astro static site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Serverless OG-image function (satori + resvg). Fonts are embedded in the code
# (netlify/functions/lib/fonts.mjs), so nothing extra needs shipping.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
